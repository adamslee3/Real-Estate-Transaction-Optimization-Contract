[project]
name = 'Real-Estate-Transaction-Optimization-Contract'
description = 'A comprehensive blockchain-based solution for streamlining real estate transactions through smart contracts'
authors = ['Real Estate Smart Contract Team']
telemetry = true
cache_dir = './.cache'
requirements = []
stacks_version = '2.4'
[contracts.document-management]
path = 'contracts/document-management.clar'
clarity_version = 2
epoch = 2.5

[contracts.escrow-coordination]
path = 'contracts/escrow-coordination.clar'
clarity_version = 2
epoch = 2.5
[repl.analysis]
passes = ['check_checker']

[repl.analysis.check_checker]
strict = false
trusted_sender = false
trusted_caller = false
callee_filter = false
